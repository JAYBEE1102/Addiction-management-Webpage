<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JAYFOUND - Access your personal hub for clarity and recovery.">
    <title>JAYFOUND | Authentication</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <div class="auth-card">
            <!-- Left Gradient Artwork Panel -->
            <div class="artwork-panel">
                <div class="artwork-top">
                    <div class="brand-badge">
                        <svg class="spark-icon spark-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2V22M2 12H22M4.929 4.929L19.071 19.071M19.071 4.929L4.929 19.071" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
                        </svg>
                        <span class="brand-name">JAYFOUND</span>
                    </div>
                </div>
                
                <div class="artwork-bottom">
                    <p class="artwork-subtitle">You can easily</p>
                    <h1 class="artwork-heading">Get access your personal hub for clarity and recovery</h1>
                </div>
            </div>

            <!-- Right Form Panel -->
            <div class="form-panel">
                <div class="form-header">
                    <svg class="spark-icon spark-violet" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2V22M2 12H22M4.929 4.929L19.071 19.071M19.071 4.929L4.929 19.071" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
                    </svg>
                    <h2 id="form-title">Create an account</h2>
                    <p id="form-subtitle">Access your recovery tracker, daily journal, and support network anytime, anywhere - and keep everything flowing in one place.</p>
                </div>

                <form id="auth-form" onsubmit="handleFormSubmit(event)">
                    <div class="input-field">
                        <label for="email">Your email</label>
                        <input type="email" id="email" value="farazhaidet786@gmail.com" placeholder="farazhaidet786@gmail.com" required>
                    </div>

                    <div class="input-field">
                        <label for="password">Password</label>
                        <div class="password-box">
                            <input type="password" id="password" value="123456789012" placeholder="••••••••••••" required>
                            <button type="button" class="eye-btn" id="eye-btn" aria-label="Toggle password visibility">
                                <svg class="eye-svg" id="eye-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="primary-btn" id="submit-btn">Get Started</button>
                </form>

                <div class="divider">
                    <div class="line"></div>
                    <span>or continue with</span>
                    <div class="line"></div>
                </div>

                <div class="social-pills">
                    <button class="pill-btn" type="button" title="Behance">
                        <span class="be-logo">Bē</span>
                    </button>
                    <button class="pill-btn" type="button" title="Google">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                        </svg>
                    </button>
                    <button class="pill-btn" type="button" title="Facebook">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="#1877F2">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                    </button>
                </div>

                <div class="auth-footer">
                    <span id="toggle-text">Don't have an account?</span>
                    <button type="button" id="toggle-btn" onclick="toggleAuthMode()">Sign up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
